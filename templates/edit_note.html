{% extends "base.html" %}
{% block title %}ノートを編集 - セキュマネ学習{% endblock %}
{% block content %}
<h2>まとめノートを編集</h2>
<div class="manage-section">
    <form action="{{ url_for('edit_note', note_id=note.id) }}" method="POST">
        <div class="form-group">
            <label for="n-category">分野</label>
            <select name="category_id" id="n-category">
                {% for cat in categories %}
                <option value="{{ cat.id }}" {{ 'selected' if cat.id == note.category_id }}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="n-title">タイトル</label>
            <input type="text" name="title" id="n-title" value="{{ note.title }}">
        </div>
        <div class="form-group">
            <label for="n-content">内容（Markdown記法が使えます）</label>
            <textarea name="content" id="n-content" rows="15">{{ note.content }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">更新</button>
        <a href="{{ url_for('manage') }}" class="btn btn-secondary">キャンセル</a>
    </form>
</div>
{% endblock %}
