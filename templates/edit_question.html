{% extends "base.html" %}
{% block title %}問題を編集 - セキュマネ学習{% endblock %}
{% block content %}
<h2>○×問題を編集</h2>
<div class="manage-section">
    <form action="{{ url_for('edit_question', question_id=question.id) }}" method="POST">
        <div class="form-group">
            <label for="q-category">分野</label>
            <select name="category_id" id="q-category">
                {% for cat in categories %}
                <option value="{{ cat.id }}" {{ 'selected' if cat.id == question.category_id }}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="q-statement">問題文</label>
            <textarea name="statement" id="q-statement" rows="3">{{ question.statement }}</textarea>
        </div>
        <div class="form-group">
            <label>正解</label>
            <div class="radio-group">
                <label><input type="radio" name="correct_answer" value="1" {{ 'checked' if question.correct_answer }}> ○（正しい）</label>
                <label><input type="radio" name="correct_answer" value="0" {{ 'checked' if not question.correct_answer }}> ×（誤り）</label>
            </div>
        </div>
        <div class="form-group">
            <label for="q-explanation">解説</label>
            <textarea name="explanation" id="q-explanation" rows="4">{{ question.explanation }}</textarea>
        </div>
        <div class="form-group">
            <label for="q-related-note">関連するまとめノート</label>
            <select name="related_note_id" id="q-related-note">
                <option value="">（未選択）</option>
                {% for n in notes %}
                <option value="{{ n.id }}" {{ 'selected' if n.id == question.related_note_id }}>{{ n.category_name }} - {{ n.title }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">更新</button>
        <a href="{{ url_for('manage') }}" class="btn btn-secondary">キャンセル</a>
    </form>
</div>
{% endblock %}
